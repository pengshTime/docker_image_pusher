name: Sync Docker Images

on:
  workflow_dispatch:
    inputs:
      provider:
        description: 'Provider to use (aliyun)'
        required: true
        default: 'aliyun'
      image_list_file:
        description: 'Path to the image list file'
        required: true
        default: 'images.txt'
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'

env:
  IMAGE_LIST_FILE: ${{ github.event.inputs.image_list_file || 'images.txt' }}

jobs:
  sync-aliyun:
    name: Sync to Aliyun
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install skopeo
        run: |
          curl -sL https://github.com/lework/skopeo-binary/releases/download/v1.14.2/skopeo-linux-amd64 -o /usr/local/bin/skopeo
          chmod +x /usr/local/bin/skopeo
          skopeo --version

      - name: Get dependencies
        run: |
          go mod tidy
          go mod download

      - name: Build
        run: |
          BUILD_TIME=$(date +%Y-%m-%d_%H:%M:%S)
          go build -ldflags "-X main.BuildTime=$BUILD_TIME" -o sync ./cmd/sync

      - name: Run sync
        env:
          PROVIDER: aliyun
          IMAGE_LIST_FILE: ${{ env.IMAGE_LIST_FILE }}
          ALIYUN_REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
          ALIYUN_NAMESPACE: ${{ secrets.ALIYUN_NAME_SPACE }}
          ALIYUN_REGISTRY_USER: ${{ secrets.ALIYUN_REGISTRY_USER }}
          ALIYUN_REGISTRY_PASSWORD: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}
        run: ./sync

      - name: Prepare Email Body
        if: always()
        run: |
          if [ -f email_report.txt ]; then
            echo "EMAIL_BODY<<EOF" >> $GITHUB_ENV
            cat email_report.txt >> $GITHUB_ENV
            echo "" >> $GITHUB_ENV
            echo "---" >> $GITHUB_ENV
            echo "查看详细日志: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "EMAIL_BODY<<EOF" >> $GITHUB_ENV
            echo "Docker镜像同步任务已完成" >> $GITHUB_ENV
            echo "" >> $GITHUB_ENV
            echo "提供商: 阿里云 (Aliyun)" >> $GITHUB_ENV
            echo "状态: ${{ job.status }}" >> $GITHUB_ENV
            echo "时间: $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
            echo "" >> $GITHUB_ENV
            echo "---" >> $GITHUB_ENV
            echo "查看详细日志: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Send Email Notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.163.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Docker镜像同步完成通知 - ${{ job.status }}
          to: ${{ secrets.EMAIL_USERNAME }}
          from: GitHub Actions
          body: ${{ env.EMAIL_BODY }}
