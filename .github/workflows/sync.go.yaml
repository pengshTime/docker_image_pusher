name: Sync Docker Images

on:
  workflow_dispatch:
    inputs:
      provider:
        description: 'Provider to use (aliyun)'
        required: true
        default: 'aliyun'
      image_list_file:
        description: 'Path to the image list file'
        required: true
        default: 'images.txt'

env:
  IMAGE_LIST_FILE: ${{ github.event.inputs.image_list_file || 'images.txt' }}

jobs:
  sync-aliyun:
    name: Sync to Aliyun
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install skopeo
        run: |
          curl -sL https://github.com/lework/skopeo-binary/releases/download/v1.14.2/skopeo-linux-amd64 -o /usr/local/bin/skopeo
          chmod +x /usr/local/bin/skopeo
          skopeo --version

      - name: Get dependencies
        run: |
          go mod tidy
          go mod download

      - name: Build
        run: |
          BUILD_TIME=$(date +%Y-%m-%d_%H:%M:%S)
          go build -ldflags "-X main.BuildTime=$BUILD_TIME" -o sync ./cmd/sync

      - name: Run sync
        env:
          PROVIDER: aliyun
          IMAGE_LIST_FILE: ${{ env.IMAGE_LIST_FILE }}
          ALIYUN_REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
          ALIYUN_NAMESPACE: ${{ secrets.ALIYUN_NAME_SPACE }}
          ALIYUN_REGISTRY_USER: ${{ secrets.ALIYUN_REGISTRY_USER }}
          ALIYUN_REGISTRY_PASSWORD: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}
        run: ./sync

      - name: Send Email Notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.163.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Docker镜像同步完成通知 - ${{ job.status }}
          to: ${{ secrets.EMAIL_USERNAME }}
          from: GitHub Actions
          body: file://email_report.txt

      - name: Delete Old Workflow Runs
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching workflow runs..."
          # 获取所有已完成的运行记录（排除当前正在运行的）
          runs=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?status=completed&per_page=100" | \
            jq -r '.workflow_runs[] | select(.id != ${{ github.run_id }}) | .id')
          
          # 删除所有旧记录
          count=0
          for run_id in $runs; do
            echo "Deleting run $run_id..."
            curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs/$run_id"
            count=$((count + 1))
          done
          
          echo "Deleted $count old workflow runs"
