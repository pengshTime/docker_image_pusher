name: Docker

on:
  workflow_dispatch:
    inputs:
      image_list_file:
        description: 'Path to the image list file'
        required: true
        default: 'images.txt'
  push:
    branches: [ main ]


env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"
  IMAGE_LIST_FILE: "${{ github.event.inputs.image_list_file || 'images.txt' }}"

jobs:

  build:
    name: Pull
    runs-on: ubuntu-latest
    steps:
    - name: Before freeing up disk space
      run: |
        echo "Before freeing up disk space"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        swap-size-mb: 128
        remove-dotnet: 'true'
        remove-haskell: 'true'
        build-mount-path: '/var/lib/docker/'

    - name: Free up disk space complete
      run: |
        echo "Free up disk space complete"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install skopeo
      run: |
        curl -sL https://github.com/lework/skopeo-binary/releases/download/v1.14.2/skopeo-linux-amd64 -o /usr/local/bin/skopeo
        chmod +x /usr/local/bin/skopeo
        skopeo --version

    - name: Validate image list file
      run: |
        if [ ! -f "$IMAGE_LIST_FILE" ]; then
            echo "Error: Image list file $IMAGE_LIST_FILE not found"
            exit 1
        fi
        total_images=$(grep -v '^#' "$IMAGE_LIST_FILE" | grep -v '^$' | wc -l)
        if [ $total_images -eq 0 ]; then
            echo "Error: No images found in $IMAGE_LIST_FILE"
            exit 1
        fi
        echo "Found $total_images images in $IMAGE_LIST_FILE"
        echo "Image list:"
        grep -v '^#' "$IMAGE_LIST_FILE" | grep -v '^$'

    - name: Build and push image Aliyun
      id: sync-images
      run: |
        # 配置skopeo认证
        echo "$ALIYUN_REGISTRY_PASSWORD" | skopeo login --username "$ALIYUN_REGISTRY_USER" --password-stdin "$ALIYUN_REGISTRY"

        # 数据预处理,判断镜像是否重名
        declare -A duplicate_images
        declare -A temp_map

        # 遍历镜像列表
        while IFS= read -r line || [ -n "$line" ]; do
            # 忽略空行与注释
            [[ -z "$line" ]] && continue
            if echo "$line" | grep -q '^\s*#'; then
                continue
            fi

            # 镜像地址
            image="$line"
            # 将@sha256:等字符删除
            image="${image%%@*}"
            echo "Processing image: $image"

            # 获取镜像名:版本号  例如nginx:1.25.3
            image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}')
            # 获取镜像名例如nginx
            image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')

            # 如果镜像存在于数组中，则添加temp_map
            if [[ -n "${temp_map[$image_name]}" ]]; then
                duplicate_images[$image_name_tag]=1
            else
                temp_map[$image_name]=1
            fi
        done < "$IMAGE_LIST_FILE"

        # 初始化成功和失败计数
        success_count=0
        failure_count=0
        skipped_count=0

        # 用于收集镜像信息
        source_images_list=""
        aliyun_images_list=""

        # 处理每个镜像
        echo "=== Starting image processing ==="
        while IFS= read -r line || [ -n "$line" ]; do
            # 忽略空行与注释
            [[ -z "$line" ]] && continue
            if echo "$line" | grep -q '^\s*#'; then
                continue
            fi

            # 镜像地址
            image="$line"
            # 将@sha256:等字符删除
            image="${image%%@*}"
            echo "=== Processing image: $image ==="

            # 获取镜像名:版本号  例如nginx:1.25.3
            image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}')
            # 获取命名空间 例如kasmweb,  这里有种特殊情况 docker.io/nginx，把docker.io当成命名空间，也OK
            name_space=$(echo "$image" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')

            # 构建目标镜像URL
            # 检查是否重名
            if [[ -n "${duplicate_images[$image_name_tag]}" ]]; then
                # 重名镜像添加命名空间前缀
                new_image="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/${name_space}_${image_name_tag}"
            else
                # 不重名镜像直接使用原镜像名
                new_image="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/$image_name_tag"
            fi
            echo "New image name: $new_image"

            # 收集镜像列表
            source_images_list+="• $image\n"
            aliyun_images_list+="• $new_image\n"

            # 构建源镜像URL
            if echo "$image" | grep -q '^[a-zA-Z0-9.-]*\/'; then
                source_image="docker://$image"
            else
                source_image="docker://docker.io/library/$image"
            fi
            echo "Source image: $source_image"

            # 检查阿里云是否已经存在该镜像
            echo "Checking if $new_image exists in Aliyun ACR"
            if skopeo inspect docker://$new_image >/dev/null 2>&1; then
                echo "Image $new_image already exists in Aliyun ACR, skipping"
                skipped_count=$((skipped_count+1))
                continue
            fi

            # 使用skopeo复制镜像，重试3次
            echo "Copying $source_image to $new_image"
            retry_count=0
            max_retries=3
            success=false

            while [ $retry_count -lt $max_retries ]; do
                if skopeo copy --override-arch amd64 --override-os linux $source_image docker://$new_image; then
                    echo "Successfully copied $source_image to $new_image"
                    success=true
                    success_count=$((success_count+1))
                    break
                else
                    echo "Failed to copy $source_image (attempt $((retry_count+1)) of $max_retries)"
                    retry_count=$((retry_count+1))
                    if [ $retry_count -lt $max_retries ]; then
                        echo "Retrying in 5 seconds..."
                        sleep 5
                    fi
                fi
            done

            if [ "$success" = false ]; then
                echo "Failed to copy $source_image after $max_retries attempts"
                failure_count=$((failure_count+1))
            fi
        done < "$IMAGE_LIST_FILE"

        # 汇总结果
        echo "=============================================================================="
        echo "Summary:"
        echo "Successfully copied $success_count images"
        echo "Skipped (already exists): $skipped_count images"
        echo "Failed to copy $failure_count images"
        echo "=============================================================================="

        # 设置输出变量
        echo "success_count=$success_count" >> $GITHUB_OUTPUT
        echo "skipped_count=$skipped_count" >> $GITHUB_OUTPUT
        echo "failure_count=$failure_count" >> $GITHUB_OUTPUT
        echo "source_images_list=$source_images_list" >> $GITHUB_OUTPUT
        echo "aliyun_images_list=$aliyun_images_list" >> $GITHUB_OUTPUT
        echo "aliyun_registry=$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE" >> $GITHUB_OUTPUT

        # 如果有失败的镜像，退出码为1
        if [ $failure_count -gt 0 ]; then
            exit 1
        fi

    - name: Send email notification
      if: always()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.163.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: Docker镜像同步完成通知
        to: ${{ secrets.EMAIL_USERNAME }}
        from: GitHub Actions
        body: |
          🐳 Docker镜像同步报告
          ━━━━━━━━━━━━━━━━━━━━
          ✅ 成功: ${{ steps.sync-images.outputs.success_count }} 个
          ⏭️ 已存在无需同步: ${{ steps.sync-images.outputs.skipped_count }} 个
          ❌ 失败: ${{ steps.sync-images.outputs.failure_count }} 个
          ━━━━━━━━━━━━━━━━━━━━
          📋 源镜像列表:
          ${{ steps.sync-images.outputs.source_images_list }}
          ━━━━━━━━━━━━━━━━━━━━
          🔗 阿里云镜像列表:
          ${{ steps.sync-images.outputs.aliyun_images_list }}
          ━━━━━━━━━━━━━━━━━━━━
          🏠 阿里云仓库地址: ${{ steps.sync-images.outputs.aliyun_registry }}
